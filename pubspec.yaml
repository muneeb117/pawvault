name: pawvault
description: A quiet, careful place to keep your pet's whole health story.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.6

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  shimmer: ^3.0.0

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  http: ^1.2.2

  # Auth
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  crypto: ^3.0.5

  # Icons
  lucide_icons_flutter: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Local notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/brand/app-icons/ios-1024.png"
  adaptive_icon_background: "#B85C32"
  adaptive_icon_foreground: "assets/brand/app-icons/android-maskable-1024.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/avatars/
    - assets/illustrations/
    - assets/icons/care/
    - assets/icons/auth/
    - assets/icons/onboarding/
    - assets/brand/icons/app/
    - assets/brand/icons/auth/
    - assets/brand/logos/
    - assets/brand/animated/
    - assets/brand/app-icons/
