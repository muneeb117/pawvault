name: pawvault
description: A quiet, careful place to keep your pet's whole health story.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.6

  # Animations
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  shimmer: ^3.0.0

  # Utilities
  image_picker: ^1.1.2
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  http: ^1.2.2

  # Auth
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1
  crypto: ^3.0.5

  # Icons
  lucide_icons_flutter: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - assets/avatars/
    - assets/illustrations/
    - assets/icons/care/
    - assets/icons/auth/
    - assets/icons/onboarding/
